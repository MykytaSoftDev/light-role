<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none" preserveAspectRatio="xMidYMid meet">
  <!-- Paper -->
  <rect x="0" y="0" width="200" height="260" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Name block (serif-suggestive) — large bold rect -->
  <rect x="30" y="40" width="100" height="10" fill="#0A0A0A"/>
  <!-- Subtle serif "feet" — 2 tiny rects under first and last letter to hint at serif typography -->
  <rect x="30" y="50" width="3" height="1.5" fill="#0A0A0A"/>
  <rect x="127" y="50" width="3" height="1.5" fill="#0A0A0A"/>

  <!-- Subtitle (italic-feel, thin) -->
  <rect x="30" y="57" width="50" height="2" fill="#737373"/>

  <!-- Hairline rule under header — 1px full column width -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Section 1: section title (sentence-case, short) -->
  <rect x="30" y="84" width="40" height="4" fill="#0A0A0A"/>
  <!-- Body lines — generous line-height -->
  <rect x="30" y="96" width="120" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="104" width="110" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="112" width="115" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="120" width="100" height="1.5" fill="#D4D4D8"/>

  <!-- Section 2: gap ~18px, then title -->
  <rect x="30" y="140" width="44" height="4" fill="#0A0A0A"/>
  <rect x="30" y="152" width="120" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="160" width="110" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="168" width="115" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="176" width="95" height="1.5" fill="#D4D4D8"/>

  <!-- Section 3: gap ~18px, then title -->
  <rect x="30" y="196" width="36" height="4" fill="#0A0A0A"/>
  <rect x="30" y="208" width="120" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="216" width="105" height="1.5" fill="#D4D4D8"/>
  <rect x="30" y="224" width="110" height="1.5" fill="#D4D4D8"/>
</svg>
