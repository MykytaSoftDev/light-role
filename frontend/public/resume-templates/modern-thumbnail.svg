  <!-- Left column content lines -->
  <!-- Contact section label -->
  <rect x="8" y="68" width="30" height="5" rx="1" fill="#4F46E5" opacity="0.6"/>
  <!-- Contact values -->
  <rect x="8" y="78" width="52" height="4" rx="1" fill="#9CA3AF" opacity="0.7"/>
  <rect x="8" y="86" width="44" height="4" rx="1" fill="#9CA3AF" opacity="0.7"/>
