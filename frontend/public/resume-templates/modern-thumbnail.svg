  <!-- Edu item -->
  <rect x="78" y="213" width="90" height="5" rx="1" fill="#374151" opacity="0.7"/>
  <rect x="78" y="222" width="70" height="4" rx="1" fill="#9CA3AF" opacity="0.6"/>
  <rect x="78" y="230" width="86" height="4" rx="1" fill="#9CA3AF" opacity="0.5"/>
