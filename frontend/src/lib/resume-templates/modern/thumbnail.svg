<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none" preserveAspectRatio="xMidYMid meet">
  <!-- Paper -->
  <rect x="0" y="0" width="200" height="260" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Header band: white name area + divider + gray subtitle band (page 1 only) -->
  <rect x="0" y="0" width="200" height="44" fill="#FFFFFF"/>
  <!-- Wide-letter-spaced uppercase name: mimic with evenly spaced blocks -->
  <rect x="40"  y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="54"  y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="68"  y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="82"  y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="96"  y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="110" y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="124" y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="138" y="20" width="8" height="4" fill="#1A1A1A"/>
  <rect x="152" y="20" width="8" height="4" fill="#1A1A1A"/>
  <!-- Divider under the name -->
  <rect x="0" y="44" width="200" height="0.6" fill="#D4D4D4"/>
  <!-- Subtitle band with role -->
  <rect x="0" y="44.6" width="200" height="12" fill="#F5F5F5"/>
  <rect x="72" y="49" width="56" height="2" fill="#525252"/>

  <!-- Two-column body below the header (y=56.6 onwards) -->
  <!-- Dark sidebar: 32% ≈ 64px wide, full remaining height -->
  <rect x="0" y="56.6" width="64" height="203.4" fill="#1A1A1A"/>

  <!-- Sidebar content: section titles + rules + icon/label rows -->
  <!-- CONTACT -->
  <rect x="8" y="68" width="32" height="2.4" fill="#FFFFFF"/>
  <rect x="8" y="73" width="48" height="0.6" fill="#4A4A4A"/>
  <!-- phone row -->
  <circle cx="12" cy="80" r="2.2" fill="none" stroke="#E5E5E5" stroke-width="0.8"/>
  <rect x="18" y="79" width="38" height="1.5" fill="#E5E5E5"/>
  <!-- email row -->
  <rect x="10" y="86" width="5" height="3.2" fill="none" stroke="#E5E5E5" stroke-width="0.8"/>
  <rect x="18" y="87" width="38" height="1.5" fill="#E5E5E5"/>
  <!-- location row -->
  <path d="M 10 93 C 10 94.5, 12.5 97, 12.5 97 C 12.5 97, 15 94.5, 15 93 A 2.5 2.5 0 1 0 10 93 Z" fill="none" stroke="#E5E5E5" stroke-width="0.8"/>
  <rect x="18" y="95" width="28" height="1.5" fill="#E5E5E5"/>
  <!-- linkedin row: filled rounded rect -->
  <rect x="10" y="101" width="5" height="5" rx="0.8" fill="#E5E5E5"/>
  <rect x="18" y="103" width="38" height="1.5" fill="#E5E5E5"/>

  <!-- EDUCATION -->
  <rect x="8" y="115" width="40" height="2.4" fill="#FFFFFF"/>
  <rect x="8" y="120" width="48" height="0.6" fill="#4A4A4A"/>
  <rect x="8" y="124" width="40" height="1.8" fill="#FFFFFF"/>
  <rect x="8" y="128" width="44" height="1.5" fill="#E5E5E5"/>
  <rect x="8" y="132" width="24" height="1.5" fill="#999999"/>

  <!-- SKILLS -->
  <rect x="8" y="142" width="24" height="2.4" fill="#FFFFFF"/>
  <rect x="8" y="147" width="48" height="0.6" fill="#4A4A4A"/>
  <!-- '// PROFESSIONAL' sub-heading -->
  <rect x="8" y="151" width="38" height="1.8" fill="#FFFFFF"/>
  <!-- bulleted items -->
  <circle cx="10" cy="157" r="0.8" fill="#E5E5E5"/>
  <rect x="13" y="156.2" width="30" height="1.5" fill="#E5E5E5"/>
  <circle cx="10" cy="161" r="0.8" fill="#E5E5E5"/>
  <rect x="13" y="160.2" width="36" height="1.5" fill="#E5E5E5"/>
  <circle cx="10" cy="165" r="0.8" fill="#E5E5E5"/>
  <rect x="13" y="164.2" width="24" height="1.5" fill="#E5E5E5"/>
  <circle cx="10" cy="169" r="0.8" fill="#E5E5E5"/>
  <rect x="13" y="168.2" width="32" height="1.5" fill="#E5E5E5"/>

  <!-- Main column content (right 68%): starts at x=64 with left padding ~8 -->
  <!-- PROFILE title + rule + body lines -->
  <rect x="74" y="68" width="28" height="2.4" fill="#1A1A1A"/>
  <rect x="74" y="73" width="118" height="0.6" fill="#D4D4D4"/>
  <rect x="74" y="78" width="118" height="1.5" fill="#262626"/>
  <rect x="74" y="82" width="110" height="1.5" fill="#262626"/>
  <rect x="74" y="86" width="114" height="1.5" fill="#262626"/>
  <rect x="74" y="90" width="86" height="1.5" fill="#262626"/>

  <!-- WORK EXPERIENCE title + rule -->
  <rect x="74" y="102" width="60" height="2.4" fill="#1A1A1A"/>
  <rect x="74" y="107" width="118" height="0.6" fill="#D4D4D4"/>

  <!-- Experience item 1: job title + meta + bullets -->
  <rect x="74" y="112" width="72" height="2" fill="#1A1A1A"/>
  <rect x="74" y="116" width="78" height="1.4" fill="#525252"/>
  <!-- bullets -->
  <circle cx="76" cy="122" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="121.2" width="110" height="1.5" fill="#262626"/>
  <circle cx="76" cy="126" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="125.2" width="100" height="1.5" fill="#262626"/>
  <circle cx="76" cy="130" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="129.2" width="106" height="1.5" fill="#262626"/>

  <!-- Experience item 2 -->
  <rect x="74" y="140" width="66" height="2" fill="#1A1A1A"/>
  <rect x="74" y="144" width="74" height="1.4" fill="#525252"/>
  <circle cx="76" cy="150" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="149.2" width="105" height="1.5" fill="#262626"/>
  <circle cx="76" cy="154" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="153.2" width="112" height="1.5" fill="#262626"/>

  <!-- Experience item 3 -->
  <rect x="74" y="164" width="58" height="2" fill="#1A1A1A"/>
  <rect x="74" y="168" width="68" height="1.4" fill="#525252"/>
  <circle cx="76" cy="174" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="173.2" width="108" height="1.5" fill="#262626"/>
  <circle cx="76" cy="178" r="0.8" fill="#1A1A1A"/>
  <rect x="79" y="177.2" width="96" height="1.5" fill="#262626"/>
</svg>
