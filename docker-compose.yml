services:
  postgres:
    image: postgres:16-alpine
    container_name: lightrole_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lightrole_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lightrole_redis
    ports:
      - "6379:6379"
    networks:
      - lightrole_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lightrole_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SENTRY_DSN: ${SENTRY_DSN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      UPLOADS_DIR: /uploads
      FRONTEND_URL: ${FRONTEND_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      PADDLE_API_KEY: ${PADDLE_API_KEY}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET}
      PADDLE_ENVIRONMENT: ${NEXT_PUBLIC_PADDLE_ENVIRONMENT:-sandbox}
      # TAILOR-4: backend posts to the frontend's internal render endpoint
      # to server-render the React resume template. The shared secret is
      # validated by the Route Handler.
      FRONTEND_INTERNAL_URL: ${FRONTEND_INTERNAL_URL:-http://frontend:3000}
      INTERNAL_RENDER_SECRET: ${INTERNAL_RENDER_SECRET}
    volumes:
      - uploads_data:/uploads
      - logs_data:/app/logs
    networks:
      - lightrole_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://dev-api.lightrole.com}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: ${NEXT_PUBLIC_PADDLE_CLIENT_TOKEN}
        NEXT_PUBLIC_PADDLE_ENVIRONMENT: ${NEXT_PUBLIC_PADDLE_ENVIRONMENT:-sandbox}
        NEXT_PUBLIC_PADDLE_PRICE_MONTHLY: ${NEXT_PUBLIC_PADDLE_PRICE_MONTHLY}
        NEXT_PUBLIC_PADDLE_PRICE_ANNUAL: ${NEXT_PUBLIC_PADDLE_PRICE_ANNUAL}
    container_name: lightrole_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://dev-api.lightrole.com}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: ${NEXT_PUBLIC_PADDLE_CLIENT_TOKEN}
      NEXT_PUBLIC_PADDLE_PRICE_MONTHLY: ${NEXT_PUBLIC_PADDLE_PRICE_MONTHLY}
      NEXT_PUBLIC_PADDLE_PRICE_ANNUAL: ${NEXT_PUBLIC_PADDLE_PRICE_ANNUAL}
      PADDLE_API_KEY: ${PADDLE_API_KEY}
      # TAILOR-4: shared secret used by the internal render Route Handler
      # to authenticate backend requests. Server-only — must NOT be prefixed
      # with NEXT_PUBLIC_ or it would leak to the browser bundle.
      INTERNAL_RENDER_SECRET: ${INTERNAL_RENDER_SECRET}
    networks:
      - lightrole_net
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: lightrole_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - lightrole_net
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  certbot:
    image: certbot/certbot:latest
    container_name: lightrole_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - lightrole_net

volumes:
  postgres_data:
    name: lightrole_postgres_data
  uploads_data:
    name: lightrole_uploads_data
  logs_data:
    name: lightrole_logs_data
  certbot_webroot:
    name: lightrole_certbot_webroot

networks:
  lightrole_net:
    name: lightrole_network
    driver: bridge
